########################### NETWORKS
# You may customize the network subnet (192.168.89.0/24) below as you please.
# Docker Compose version 3.5 or higher required to define networks this way.

networks:
  default:
    driver: bridge
  # npm_proxy:
  #   name: npm_proxy
  #   driver: bridge
  #   ipam:
  #     config:
  #       - subnet: 192.168.89.0/24
  proxy-net:
    name: proxy-net
    external: true

########################### EXTENSION FIELDS
# Helps eliminate repetition of sections
# More Info on how to use this: https://github.com/htpcBeginner/docker-traefik/pull/228

# Common environment values
x-environment: &default-tz-puid-pgid
  TZ: $TZ
  PUID: $PUID
  PGID: $PGID

# Keys common to some of the core services that we always to automatically restart on failure
x-common-keys-core: &common-keys-core
  networks:
    - proxy-net
  security_opt:
    - no-new-privileges:true
  restart: always

# Keys common to some of the dependent services/apps
x-common-keys-apps: &common-keys-apps
  networks:
    - proxy-net
  security_opt:
    - no-new-privileges:true
  restart: unless-stopped

# Keys common to some of the services in media-services.txt
x-common-keys-media: &common-keys-media
  networks:
    - proxy-net
  security_opt:
    - no-new-privileges:true
  restart: unless-stopped
########################### SERVICES

services:

  # nzbget - Binary newsgrabber (NZB downloader)
  nzbget:
    <<: *common-keys-apps # See EXTENSION FIELDS at the top
    image: nzbgetcom/nzbget:latest
    container_name: nzbget
    networks:
      proxy-net:
        ipv4_address: 192.168.89.216
    ports:
      - "6789:6789"
    volumes:
      - $APPDATA/nzbget:/config
      - $SSDDOWNLOADDIR/queue:/downloads/queue
      - $SSDDOWNLOADDIR/intermediate:/downloads/intermediate
      - $SSDDOWNLOADDIR/nzb:/downloads/nzb
      - $SSDDOWNLOADDIR/tmp:/downloads/tmp
      - $SSDDOWNLOADDIR/scripts:/downloads/scripts
      - /home/brad/media/hdd8tb/downloads/completed:/downloads/completed
    environment:
      <<: *default-tz-puid-pgid
    labels:
      caddy: nzbget.bradserver.dev
      caddy.reverse_proxy: "{{upstreams 6789}}"


  qbittorrent:
    #<<: *common-keys-media # See EXTENSION FIELDS at the top
    image: lscr.io/linuxserver/qbittorrent:latest
    networks:
      proxy-net:
    container_name: qbittorrent
    environment:
      - PUID=1000
      - PGID=1000
      - WEBUI_PORT=8091
      - TORRENTING_PORT=51413
    volumes:
      - $APPDATA/qbittorrent:/config
      - $DOWNLOADDIR/torrents:/downloads #optional
    ports:
      #- 8091:8080
      - 6881:6881
      - 51413:51413
      - 51413:51413/udp
    restart: unless-stopped
    labels:
        caddy: torrent.bradserver.dev
        caddy.reverse_proxy: "{{upstreams 8091}}"
        #caddy.reverse_proxy: "192.168.0.5:8091"


########################## PVRs

  # Radarr - Movie management
  radarr:
    <<: *common-keys-media # See EXTENSION FIELDS at the top
    image: lscr.io/linuxserver/radarr:nightly # latest tag was causing "Error parsing column 45"
    container_name: radarr
    networks:
      proxy-net:
    ports:
      - "7878:7878"
    volumes:
      - $APPDATA/radarr:/config
      - $DOWNLOADDIR:/downloads/
      - $DATADIR:/movies
      - "/etc/localtime:/etc/localtime:ro"
    environment:
      <<: *default-tz-puid-pgid
    labels:
      caddy: radarr.bradserver.dev
      caddy.reverse_proxy: "{{upstreams 7878}}"

  # Radarr 4K - Movie management
