#################### Books

  bookshelf:
    <<: *common-keys-media # See EXTENSION FIELDS at the top
    image: ghcr.io/pennydreadful/bookshelf:softcover 
    container_name: bookshelf
    ports:
      - "8987:8787"
    volumes:
      - $APPDATA/bookshelf:/config
      - '$DATADIR/media3/books:/config/Calibre Library'
      #- $DOWNLOADDIR/torrents/completed/books:/downloads/completed/books
      - $DOWNLOADDIR/torrents:/downloads
      - $DOWNLOADDIR/completed/eBooks:/downloads/completed/eBooks
      - $DOWNLOADDIR/
    environment:
      <<: *default-tz-puid-pgid
    labels:
      caddy: readarr.bradserver.dev
      caddy.reverse_proxy: "{{upstreams 8787}}"

  bookshelf-audio:
    <<: *common-keys-media # See EXTENSION FIELDS at the top
    image: ghcr.io/pennydreadful/bookshelf:hardcover 
    container_name: bookshelf-audio
    ports:
      - "8988:8787"
    volumes:
      - $APPDATA/bookshelf-audio:/config
      - $DATADIR/hdd8tb/audiobooks:/audiobooks
      - $DOWNLOADDIR/torrents/completed/audiobooks:/downloads/completed/audiobooks
      - $DOWNLOADDIR/torrents/Audiobooks:/downloads/completed/Audiobooks
      - $DOWNLOADDIR/torrents:/downloads
    environment:
      <<: *default-tz-puid-pgid
    labels:
      caddy: readarr-audio.bradserver.dev
      caddy.reverse_proxy: "{{upstreams 8787}}"

  jellyfin:
    <<: *common-keys-media # See EXTENSION FIELDS at the top
    user: 1000:1000
    cpu_shares: 2000
    blkio_config:
      weight: 600
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    volumes:
      - /home/brad/jellyfin:/config
      - $DATADIR:/data/tvshows
      - $DATADIR:/data/movies
      - /dev/shm:/data/transcode # Offload transcoding to RAM if you have enough RAM
    ports:
      - 8096:8096
    environment:
      #<<: *default-tz-puid-pgid
      NVIDIA_VISIBLE_DEVICES: all
      JELLYFIN_PublishedServerUrl: https://jellyfin.bradserver.dev
      JELLYFIN_DATA_DIR: /config/data
      JELLYFIN_CONFIG_DIR: /config
      JELLYFIN_LOG_DIR: /config/log
      JELLYFIN_CACHE_DIR: /config/cache
    runtime: nvidia
    labels:
      caddy: jellyfin.bradserver.dev
      caddy.reverse_proxy: "{{upstreams 8096}}"


  calibre:
    <<: *common-keys-media # See EXTENSION FIELDS at the top
    image: lscr.io/linuxserver/calibre:latest
    container_name: calibre
    security_opt:
      - seccomp:unconfined #optional
    environment:
      <<: *default-tz-puid-pgid
      CUSTOM_USER: $CALIBRE_USER
      PASSWORD: $CALIBRE_PASS
#      CLI_ARGS: #optional
    volumes:
      - '$DATADIR/media3/books:/config/Calibre Library'
      - "$DATADIR/media3/ttrpg-library:/config/TTRPG Library"
      #- '$DOCKERDIR/appdata/calibre/Calibre Library:/config/Calibre Library'
      - $APPDATA/calibre:/config
      - $DATADIR/calibreimport:/media/import
    ports:
      - 8380:8080
      - 8381:8081
#    restart: unless-stopped
    labels:
      caddy: calibre.bradserver.dev
      caddy.reverse_proxy: "{{upstreams 8080}}"

  calibre-web:
